# Harness Autopilot — 自治编排配置
# 文档: .harness/runner/README.md

version: "1.0"

autonomy:
  # assume-and-document | ask-user (仅交互模式)
  clarify: assume-and-document
  # auto | skip | full (L 档)
  checklist: auto
  # never | batch-only | always
  human_verification: never
  # skip-and-continue | abort-run
  blocked_task: skip-and-continue
  # always_create | on-success | never
  pr: on-success
  max_fix_retries: 3
  # 单 phase 最大重试
  max_phase_retries: 2

tier_detection:
  default: M
  rules:
    - tier: S
      patterns:
        - "修复"
        - "bugfix"
        - "bug"
        - "字段"
        - "文案"
        - "样式"
    - tier: L
      patterns:
        - "改造"
        - "新系统"
        - "跨模块"
        - "迁移"
        - "重构"

gates:
  specify:
    max_user_stories: 3
    min_acceptance_scenarios_per_us: 1
  plan_tasks:
    max_tasks: 30
    require_plan: true
  discover:
    min_discovery_lines: 20

paths:
  constitution_harness: .harness/constitution.md
  constitution: .specify/memory/constitution.md
  specs_dir: specs
  harness_sprints: .harness/sprints
  harness_metrics: .harness/metrics
  harness_scope: .harness/scope

agent:
  # Cursor CLI 或其它 agent 可执行文件；空则使用 in-process（当前 IDE Agent 执行）
  bin: "${CURSOR_AGENT_BIN:-}"
  extra_args: ["--print", "-f"]
  model: "${CURSOR_AGENT_MODEL:-}"

git:
  branch_prefix: "cursor"
  branch_suffix: "f82a"

# SDD 提供方：speckit（默认）| openspec
sdd:
  provider: speckit
  openspec_changes_dir: openspec/changes
  # openspec 模式下若 change 已存在，跳过 SPECIFY+PLAN_TASKS 直接 sync

session:
  # EXEC 每批次完成后强制新 Agent 会话
  new_session_per_exec_batch: true
  # 每 phase 切换也递增 session_id
  new_session_per_phase: true

webhook:
  # Webhook 默认走 Autopilot 全流程
  autopilot_enabled: true

sandbox:
  # HARNESS_SANDBOX=1 时 L1 在 Docker 容器内执行
  enabled: false
  image: harness-sandbox:latest

metrics:
  # Autopilot run 结束时写入 .harness/metrics/autopilot-<run_id>.json
  auto_write: true
  # 可选外部 API（设 HARNESS_METRICS_API_URL 覆盖）
  api_url: "${HARNESS_METRICS_API_URL:-}"

parallel:
  # EXEC 阶段 [P] 任务并行上限
  max_parallel: 4
  # 真实多进程 sub-agent（需 Cursor CLI）
  subprocess_enabled: true
  timeout_ms: 600000

learning:
  # init/run 时自动应用 learned-policy.json
  auto_apply: true

monorepo:
  # SPRINT 后自动生成 .harness/scope/sprint-N.yaml
  auto_scope: true

pr:
  mode: draft
  base_branch: main
  labels:
    - autopilot
  required_reviewers: []
