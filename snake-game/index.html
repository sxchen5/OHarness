<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🐍 贪吃蛇</h1>
      <p class="subtitle">方向键移动 · 空格暂停 · 吃到食物得分</p>
    </header>

    <div class="stats">
      <div class="stat">
        <span class="label">当前分数</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">最高分</span>
        <span id="high-score" class="value">0</span>
      </div>
      <div class="stat">
        <span class="label">速度</span>
        <span id="speed" class="value">普通</span>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="game-canvas" width="400" height="400" aria-label="贪吃蛇游戏画布"></canvas>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-text">游戏结束</p>
        <p id="final-score" class="final-score"></p>
      </div>
      <div id="pause-banner" class="pause-banner hidden">已暂停</div>
    </div>

    <div class="controls">
      <button id="restart-btn" type="button">重新开始</button>
    </div>

    <footer class="footer">
      <p>↑ ↓ ← → 控制方向 · 空格键暂停/继续</p>
    </footer>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
